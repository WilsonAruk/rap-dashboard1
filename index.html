<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rap & Música Urbana — Brasil</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; padding: 24px; }
.container { max-width: 1200px; margin: 0 auto; }
.hd { display: flex; align-items: center; justify-content: space-between; padding-bottom: 1rem; border-bottom: 1px solid #e0e0e0; margin-bottom: 1.25rem; }
.hd h1 { font-size: 20px; font-weight: 600; }
.hd p { font-size: 12px; color: #666; margin-top: 3px; }
.badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; background: #e8f4fd; color: #1a6da8; }
.metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.25rem; }
.mc { background: #fff; border-radius: 10px; padding: 14px 16px; border: 1px solid #e8e8e8; }
.mc-label { font-size: 12px; color: #888; margin-bottom: 4px; }
.mc-value { font-size: 22px; font-weight: 600; }
.mc-sub { font-size: 11px; color: #aaa; margin-top: 2px; }
.filters { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
.fb { font-size: 12px; padding: 5px 14px; border-radius: 20px; border: 1px solid #ddd; background: #fff; color: #555; cursor: pointer; }
.fb.active { background: #1a1a1a; border-color: #1a1a1a; color: #fff; }
.si { margin-left: auto; font-size: 13px; padding: 6px 14px; border-radius: 8px; border: 1px solid #ddd; background: #fff; width: 200px; }
.tw { background: #fff; border: 1px solid #e8e8e8; border-radius: 12px; overflow: hidden; }
.thead { display: grid; grid-template-columns: 36px 52px 2fr 1.5fr 1.2fr 120px 70px; padding: 10px 16px; background: #fafafa; border-bottom: 1px solid #e8e8e8; }
.th { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
.row { display: grid; grid-template-columns: 36px 52px 2fr 1.5fr 1.2fr 120px 70px; padding: 10px 16px; border-bottom: 1px solid #f0f0f0; align-items: center; }
.row:last-child { border-bottom: none; }
.row:hover { background: #fafafa; }
.rank { font-size: 14px; font-weight: 600; color: #aaa; }
.rank.top { color: #1db954; }
.cover { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; }
.cover-ph { width: 40px; height: 40px; border-radius: 6px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.st { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ss { font-size: 11px; color: #aaa; margin-top: 2px; }
.cell { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cell-sec { font-size: 12px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lp { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 500; background: #e8f4fd; color: #1a6da8; display: inline-block; white-space: nowrap; max-width: 110px; overflow: hidden; text-overflow: ellipsis; }
.gpill { font-size: 10px; padding: 2px 6px; border-radius: 20px; background: #f0f0f0; color: #666; margin-left: 5px; }
.pop-wrap { display: flex; align-items: center; gap: 5px; }
.pop-bar { width: 44px; height: 5px; background: #eee; border-radius: 4px; overflow: hidden; }
.pop-fill { height: 100%; background: #1db954; border-radius: 4px; }
.playbtn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; }
.playbtn.playing { background: #1db954; border-color: #1db954; color: #fff; }
.loading-row { padding: 2.5rem; text-align: center; color: #888; font-size: 14px; }
.err { color: #c0392b; }
.player-bar { background: #fff; border: 1px solid #e8e8e8; border-radius: 12px; padding: 12px 16px; margin-top: 1rem; display: none; align-items: center; gap: 12px; }
.player-bar.visible { display: flex; }
.player-info { flex: 1; min-width: 0; }
.player-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.player-sub { font-size: 12px; color: #888; }
.prog-wrap { flex: 2; height: 4px; background: #eee; border-radius: 4px; overflow: hidden; }
.prog-fill { height: 100%; background: #1db954; border-radius: 4px; width: 0%; }
.dur { font-size: 12px; color: #888; min-width: 32px; text-align: right; }
footer { font-size: 11px; color: #bbb; margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid #eee; }
</style>
</head>
<body>
<div class="container">
  <div class="hd">
    <div>
      <h1>Rap &amp; Música Urbana — Brasil</h1>
      <p id="lastUpdate">Carregando...</p>
    </div>
    <span class="badge">Deezer API</span>
  </div>
  <div class="metrics">
    <div class="mc"><div class="mc-label">Faixas</div><div class="mc-value" id="mTotal">—</div><div class="mc-sub">Rap + trap + hip-hop BR</div></div>
    <div class="mc"><div class="mc-label">Artistas únicos</div><div class="mc-value" id="mArtists">—</div><div class="mc-sub">Cena nacional</div></div>
    <div class="mc"><div class="mc-label">Com preview</div><div class="mc-value" id="mPrev">—</div><div class="mc-sub">Ouça 30 seg.</div></div>
    <div class="mc"><div class="mc-label">Fonte</div><div class="mc-value" style="font-size:15px;margin-top:4px">Deezer</div><div class="mc-sub">Dados em tempo real</div></div>
  </div>
  <div class="filters">
    <span style="font-size:12px;color:#888">Gênero:</span>
    <button class="fb active" onclick="setFilter('todos',this)">Todos</button>
    <button class="fb" onclick="setFilter('rap',this)">Rap</button>
    <button class="fb" onclick="setFilter('trap',this)">Trap</button>
    <button class="fb" onclick="setFilter('hip-hop',this)">Hip-hop</button>
    <input class="si" type="text" placeholder="Buscar artista ou música..." oninput="setSearch(this.value)">
  </div>
  <div class="tw">
    <div class="thead">
      <div class="th">#</div>
      <div class="th"></div>
      <div class="th">Música</div>
      <div class="th">Artista</div>
      <div class="th">Álbum</div>
      <div class="th">Gravadora</div>
      <div class="th">Play</div>
    </div>
    <div id="tableBody"><div class="loading-row">Iniciando...</div></div>
  </div>
  <div class="player-bar" id="playerBar">
    <div id="playerCover" style="width:40px;height:40px;border-radius:6px;background:#f0f0f0;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;">♪</div>
    <div class="player-info">
      <div class="player-title" id="playerTitle">—</div>
      <div class="player-sub" id="playerArtist">—</div>
    </div>
    <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
    <div class="dur" id="durEl">0:00</div>
    <button class="playbtn" onclick="stopAudio()" style="flex-shrink:0">&#9646;&#9646;</button>
  </div>
  <footer>Dados via Deezer API · rap-dashboard1.vercel.app</footer>
</div>
<audio id="audioEl"></audio>
<script>
const BASE_URL = 'https://rap-dashboard1.vercel.app';
let allTracks = [], currentFilter = 'todos', currentSearch = '', currentBtn = null, progInterval = null;

const queries = [
  { q: 'rap brasileiro', genre: 'rap' },
  { q: 'trap brasil', genre: 'trap' },
  { q: 'hip hop nacional', genre: 'hip-hop' },
  { q: 'matuê djonga emicida criolo', genre: 'rap' },
  { q: 'mc hariel orochi teto xamã', genre: 'trap' },
];

function setStatus(msg) { document.getElementById('lastUpdate').textContent = msg; }

async function searchDeezer(q, genre) {
  const res = await fetch(`${BASE_URL}/api/search?q=${encodeURIComponent(q)}&limit=25`);
  const data = await res.json();
  return (data.data || []).map(t => ({
    id: t.id,
    name: t.title,
    artist: t.artist.name,
    album: t.album.title,
    albumId: t.album.id,
    cover: t.album.cover_small,
    preview: t.preview,
    duration: t.duration,
    rank: t.rank,
    _genre: genre,
    _label: 'Independente'
  }));
}

async function getAlbumLabel(albumId) {
  try {
    const res = await fetch(`${BASE_URL}/api/album?id=${albumId}`);
    const data = await res.json();
    return data?.label || 'Independente';
  } catch { return 'Independente'; }
}

async function loadAll() {
  try {
    setStatus('Buscando faixas na Deezer...');
    const results = await Promise.all(queries.map(({ q, genre }) => searchDeezer(q, genre).catch(() => [])));
    const seen = new Set();
    allTracks = results.flat().filter(t => { if (seen.has(t.id)) return false; seen.add(t.id); return true; });
    if (!allTracks.length) throw new Error('Nenhuma faixa retornada.');

    setStatus('Buscando gravadoras...');
    const albumIds = [...new Set(allTracks.map(t => t.albumId).filter(Boolean))].slice(0, 20);
    const labelMap = {};
    await Promise.all(albumIds.map(async id => { labelMap[id] = await getAlbumLabel(id); }));
    allTracks = allTracks.map(t => ({ ...t, _label: labelMap[t.albumId] || 'Independente' }));

    const now = new Date();
    setStatus(`Atualizado ${now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})} · ${now.toLocaleDateString('pt-BR')} · Deezer API`);
    document.getElementById('mTotal').textContent = allTracks.length;
    document.getElementById('mArtists').textContent = new Set(allTracks.map(t => t.artist)).size;
    document.getElementById('mPrev').textContent = allTracks.filter(t => t.preview).length;
    renderTable();
  } catch(e) {
    setStatus('Erro: ' + e.message);
    document.getElementById('tableBody').innerHTML = `<div class="loading-row err">${e.message}</div>`;
  }
}

function filtered() {
  let d = allTracks;
  if (currentFilter !== 'todos') d = d.filter(t => t._genre === currentFilter);
  if (currentSearch) { const s = currentSearch.toLowerCase(); d = d.filter(t => t.name.toLowerCase().includes(s) || t.artist.toLowerCase().includes(s)); }
  return d;
}

function renderTable() {
  const data = filtered();
  const body = document.getElementById('tableBody');
  if (!data.length) { body.innerHTML = '<div class="loading-row">Nenhuma faixa encontrada.</div>'; return; }
  const playIcon = '&#9654;';
  body.innerHTML = data.map((t, i) => {
    const coverEl = t.cover ? `<img class="cover" src="${t.cover}" alt="">` : `<div class="cover-ph">♪</div>`;
    const dur = t.duration ? `${Math.floor(t.duration/60)}:${String(t.duration%60).padStart(2,'0')}` : '—';
    const pop = Math.min(100, Math.round((t.rank||0)/10000));
    const popEl = `<div class="pop-wrap"><div class="pop-bar"><div class="pop-fill" style="width:${pop}%"></div></div><span style="font-size:11px;color:#888">${pop}</span></div>`;
    const prev = (t.preview||'').replace(/'/g,"\\'");
    const tit = t.name.replace(/'/g,"\\'");
    const art = t.artist.replace(/'/g,"\\'");
    const cov = (t.cover||'').replace(/'/g,"\\'");
    const playBtn = t.preview
      ? `<button class="playbtn" id="pbtn-${t.id}" onclick="togglePlay('${t.id}','${prev}','${tit}','${art}','${cov}')">${playIcon}</button>`
      : `<span style="color:#ddd;font-size:12px">—</span>`;
    return `<div class="row">
      <div class="rank ${i<3?'top':''}">${i+1}</div>
      <div>${coverEl}</div>
      <div><div class="st">${t.name}<span class="gpill">${t._genre}</span></div><div class="ss">${dur}</div></div>
      <div class="cell">${t.artist}</div>
      <div class="cell-sec">${t.album}</div>
      <div><span class="lp" title="${t._label}">${t._label}</span></div>
      <div>${playBtn}</div>
    </div>`;
  }).join('');
}

function setFilter(f, btn) { currentFilter = f; document.querySelectorAll('.fb').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderTable(); }
function setSearch(v) { currentSearch = v; renderTable(); }

function stopAudio() {
  const audio = document.getElementById('audioEl');
  audio.pause(); audio.src = '';
  if (currentBtn) { currentBtn.classList.remove('playing'); currentBtn.innerHTML = '&#9654;'; }
  clearInterval(progInterval);
  document.getElementById('playerBar').classList.remove('visible');
  document.getElementById('progFill').style.width = '0%';
  currentBtn = null;
}

function togglePlay(id, preview, title, artist, cover) {
  const btn = document.getElementById(`pbtn-${id}`);
  const audio = document.getElementById('audioEl');
  if (currentBtn === btn && !audio.paused) { stopAudio(); return; }
  stopAudio();
  currentBtn = btn;
  btn.classList.add('playing'); btn.innerHTML = '&#9646;&#9646;';
  document.getElementById('playerTitle').textContent = title;
  document.getElementById('playerArtist').textContent = artist;
  const pc = document.getElementById('playerCover');
  pc.innerHTML = cover ? `<img src="${cover}" style="width:40px;height:40px;border-radius:6px;object-fit:cover">` : '♪';
  document.getElementById('playerBar').classList.add('visible');
  audio.src = preview; audio.play().catch(()=>{});
  clearInterval(progInterval);
  progInterval = setInterval(() => {
    if (audio.duration) {
      document.getElementById('progFill').style.width = ((audio.currentTime/audio.duration)*100).toFixed(1)+'%';
      const s = Math.floor(audio.currentTime);
      document.getElementById('durEl').textContent = `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
    }
  }, 500);
  audio.onended = () => stopAudio();
}

loadAll();
</script>
</body>
</html>
